# Стандартная конфигурация Alembic для миграций базы данных
[alembic]
# Путь к директории с миграциями
script_location = alembic

# Шаблон имени файла миграции
file_template = %%(rev)s_%%(slug)s

# Кодировка файлов миграций
source_encoding = utf-8

# URL базы данных (переопределяется в env.py через settings)
sqlalchemy.url = sqlite+aiosqlite:///data/tg_parser.db

[post_write_hooks]
# Форматировщик для новых миграций
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
